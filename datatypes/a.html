<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // number

      let age = 21;
      console.log(age);

      //String

      let a = "Sudheer";
      console.log(a);

      //boolean
      let isStudent = true;
      console.log(isStudent);

      //Undefined
      let x;
      console.log(x);

      //Null
      let y = null;
      console.log(y);

      //BigInt
      let num = 12345678901234567890n;
      console.log(num);

      //Symbol
      let id = Symbol("id");
      console.log(id);

      // Non-Primitive Data Types
      //. Object
      let student = {
        name: "Sudheer",
        age: 45
      };

      console.log(student.name,student.age);
console.log(student);
      //Array
      let colors = ["Red", "Green", "Blue"];

      console.log(colors[1]);

      //Function
      function fun() {
        console.log("Hello");
      }

      fun();
    </script>
  </body>
</html>
