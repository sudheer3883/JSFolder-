<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Document</title>

  <body>
    <script>
      // get user to input a number using prompt ("Enter a number :") check if the number is a multiple of 5 or not
      //;; alert se one time ke liye browser par alert ata hai
      //;; prompt se bhi browser one time pop hota hai lekin isme prompt yni likhne ki featuresw hota hai   fir print bhi ho jata hai
      let num = prompt("enter a number");
      if (num % 5 == 0) {
        console.log(num, "is a  multiple of 5");
      } else {
        console.log("is  not multiplr of 5");
      }
    </script>
  </body>
</html>
