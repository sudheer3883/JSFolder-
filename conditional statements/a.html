<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      /// conditional statement
      // if statement
      let age = 25;
      if (age > 18) {
        console.log("you can vote ");
      }
      let ag = 17;
      if (ag < 18) {
        console.log("note vote");
      }

      /// if elese statement ye  kehta if true to true chalege agar if true nhi to else print hoga
      let ages = 15;
      if (ages > 18) {
        console.log("vote");
      } else {
        console.log("not vote");
      }

      /// else if  statement multipe conditions check
      let mod = "blue";
      let color;
      if (mod == "dark") {
        color = "black";
      } else if (mod == "blue") {
        color = "blue";
      } else if (mod == "pink") {
        color = "pink";
      } else {
        color = "white";
      }
      console.log(color);

      /// Ternary Operator condition?true outpuit:false output
      let ager = 15;
      let result = ager >= 18 ? "adult" : "not adult";
      console.log(result);
    </script>
  </body>
