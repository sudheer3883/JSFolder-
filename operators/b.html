<body>
    <script>
        //comparison Operators
       let a = 10;
let b = 5;

console.log(a == 10);    // true   // Barabar hai (sirf value check)     10 == "10"   true 
console.log(a === "10"); // false //Bilkul barabar (value + data type check)   false
console.log(a != b);     // true   //Barabar nahi hai   10 != 5  true
console.log(a !== "10"); // true  //Bilkul barabar nahi hai (value ya type different)  10 !== "10"    true
console.log(a > b);      // true  //Bada hai   10>5 true
console.log(a < b);      // false // chota hai 5<10 true 
console.log(a >= 10);    // true//bada uya  brabar hai 10>=10  true
console.log(b <= 10);    // true  //  Chhota ya barabar hai   5<=10 true
// Comparison Operators

// ==   Equal To
// ===  Strict Equal To
// !=   Not Equal To
// !==  Strict Not Equal To
// >    Greater Than
// <    Less Than
// >=   Greater Than or Equal To
// <=   Less Than or Equal To
    </script>
