<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // Arithmatic operator
      let a = 5;
      let b = 6;
      console.log("a=", a, "&b=", b);
      console.log("a+b=", a + b);
      console.log("a-b=", a - b);
      console.log("a*b=", a * b);
      console.log("a%b=", a % b);
      console.log("a**b=", a ** b);

      ///unary increment/decrement
      let c = 5;
      c++; //c=c+1
      console.log(c);

      // decremnt
      let d = 5;
      d--; //d=d-1
      console.log(d);

      // Assignment Operators
      // =, +=, -=, *=, /=, %=, **=

     let e = 5;
let f = 2;
let g = 3;
let h = 4;

e += 4; // e = e + 4
console.log(e); // 9

f -= 1; // f = f - 1
console.log(f); // 1

g *= 4; // g = g * 4
console.log(g); // 12

h **= 2; // h = h ** 2
console.log(h); // 16
    </script>
  </body>
</html>
