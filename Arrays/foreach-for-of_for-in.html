<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let num = [3, 54, 1, 2, 4];
      for (let i = 0; i < num.length; i++) {
        console.log(num[i]);
      }

      //for each se // call a function once for each array element

      num.forEach((b) => {
        console.log(b ** 2);
      });

      //for of loop;-- array access  value deta
      for (let c of num) {
        console.log(c * c);
      }

      // for in  array acess key deta hai]
      for (let i in num) {
        console.log(i);
      }
    </script>
  </body>
</html>
