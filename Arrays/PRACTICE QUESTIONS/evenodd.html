<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      /// even or odd
      let arr = [10, 15, 20, 25, 30];

      for (let i = 0; i < arr.length; i++) {
        if (arr[i] % 2 == 0) {
          console.log(arr[i] + " Even");
        } else {
          console.log(arr[i] + " Odd");
        }
      }
    </script>
  </body>
</html>
