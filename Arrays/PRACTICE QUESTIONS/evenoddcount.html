<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let arr = [1, 2, 3, 4, 5, 6];

      let evenCount = 0;
      let oddCount = 0;

      for (let i = 0; i < arr.length; i++) {
        if (arr[i] % 2 == 0) {
          evenCount++;
        } else {
          oddCount++;
        }
      }

      console.log("Even =", evenCount);
      console.log("Odd =", oddCount);
    </script>
  </body>
</html>
