<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      function fact(a) {
        if (a == 0 || a == 1) {
          console.log("factorial is 1");
        } else if (a > 1) {
          let f = 1;
          for (i = 1; i <= a; i++) {
            f = f * i;
          }
          console.log(`factorial is ${f}`);
        }
      }
      fact(5);
    </script>
  </body>
</html>
